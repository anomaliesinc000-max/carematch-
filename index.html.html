<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ケアマッチ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4; --white: #fff; --ink: #1a1a18; --ink-light: #6b6b65;
    --accent: #3d6b4f; --accent-light: #e8f0eb; --border: #e2e0da;
    --radius: 4px; --red: #c0392b;
  }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.7; }

  /* PASSWORD */
  .pw-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .pw-box { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 48px 40px; width: 100%; max-width: 360px; text-align: center; }
  .pw-logo { font-family: 'Shippori Mincho', serif; font-size: 28px; font-weight: 600; margin-bottom: 4px; }
  .pw-logo span { color: var(--accent); }
  .pw-tagline { font-size: 12px; color: var(--ink-light); margin-bottom: 36px; }
  .pw-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-light); display: block; margin-bottom: 10px; text-align: left; }
  .pw-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 16px; letter-spacing: 0.15em; outline: none; text-align: center; transition: border-color 0.2s; margin-bottom: 12px; }
  .pw-input:focus { border-color: var(--accent); }
  .pw-input.error { border-color: var(--red); animation: shake 0.3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .pw-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; cursor: pointer; margin-bottom: 12px; }
  .pw-btn:hover { opacity: 0.85; }
  .pw-error { font-size: 12px; color: var(--red); display: none; margin-bottom: 8px; }
  .pw-error.show { display: block; }
  .pw-hint { font-size: 11px; color: var(--ink-light); margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }

  /* APP */
  .app { display: none; }
  .app.active { display: block; }
  header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 16px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Shippori Mincho', serif; font-size: 18px; font-weight: 600; flex-shrink: 0; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .tab-btn { padding: 6px 12px; border: 1px solid transparent; background: none; border-radius: 20px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; color: var(--ink-light); transition: all 0.2s; white-space: nowrap; }
  .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .tab-btn:hover:not(.active) { border-color: var(--border); color: var(--ink); }
  .logout-btn { padding: 5px 10px; border: 1px solid var(--border); background: none; border-radius: 20px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 11px; color: var(--ink-light); white-space: nowrap; }

  .page { display: none; }
  .page.active { display: block; }

  /* USER */
  .hero { padding: 40px 24px 28px; text-align: center; }
  .hero-label { font-size: 11px; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .hero h1 { font-family: 'Shippori Mincho', serif; font-size: 24px; font-weight: 400; line-height: 1.5; margin-bottom: 6px; }
  .hero p { color: var(--ink-light); font-size: 13px; }
  .search-bar-wrap { max-width: 480px; margin: 20px auto; padding: 0 16px; position: relative; }
  .search-bar { width: 100%; padding: 11px 40px 11px 16px; border: 1px solid var(--border); border-radius: 24px; background: var(--white); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; outline: none; }
  .search-bar:focus { border-color: var(--accent); }
  .search-icon { position: absolute; right: 28px; top: 50%; transform: translateY(-50%); color: var(--ink-light); pointer-events: none; }
  .section-label { font-size: 11px; letter-spacing: 0.12em; color: var(--ink-light); text-transform: uppercase; padding: 0 16px; margin-bottom: 12px; }
  .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 0 16px; max-width: 900px; margin: 0 auto 40px; }
  .category-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: all 0.2s; }
  .category-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(61,107,79,0.08); }
  .cat-icon { font-size: 22px; margin-bottom: 8px; display: block; }
  .cat-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; line-height: 1.4; }
  .cat-desc { font-size: 11px; color: var(--ink-light); }
  .cat-count { font-size: 11px; color: var(--accent); margin-top: 6px; }

  /* VIDEO PANEL - スマホでは全画面 */
  .video-panel { display: none; position: fixed; top: 56px; right: 0; width: 100%; max-width: 420px; height: calc(100vh - 56px); background: var(--white); border-left: 1px solid var(--border); overflow-y: auto; z-index: 50; animation: slideIn 0.25s ease; }
  .video-panel.open { display: block; }
  @keyframes slideIn { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }
  .panel-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .panel-title { font-family: 'Shippori Mincho', serif; font-size: 16px; line-height: 1.4; }
  .panel-close { background: none; border: none; cursor: pointer; color: var(--ink-light); font-size: 20px; padding: 2px; flex-shrink: 0; line-height: 1; }
  .video-list { padding: 12px; display: flex; flex-direction: column; gap: 12px; }
  .video-card { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .video-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .video-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .video-thumb-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--accent); }
  .video-info { padding: 12px; }
  .video-title { font-size: 13px; font-weight: 500; line-height: 1.5; margin-bottom: 4px; }
  .video-memo-text { font-size: 12px; color: var(--ink-light); line-height: 1.6; margin-bottom: 4px; background: var(--bg); padding: 6px 10px; border-radius: var(--radius); }
  .video-link { display: inline-flex; align-items: center; gap: 4px; margin-top: 10px; padding: 7px 16px; background: var(--accent); color: white; border-radius: 20px; font-size: 12px; text-decoration: none; }
  .video-link:hover { opacity: 0.85; }
  .empty-panel { padding: 48px 20px; text-align: center; color: var(--ink-light); font-size: 13px; }

  /* ADMIN */
  .admin-wrap { max-width: 720px; margin: 0 auto; padding: 32px 16px; }
  .admin-title { font-family: 'Shippori Mincho', serif; font-size: 20px; font-weight: 400; margin-bottom: 4px; }
  .admin-sub { color: var(--ink-light); font-size: 13px; margin-bottom: 24px; }

  .pw-manage-card { background: var(--accent-light); border: 1px solid rgba(61,107,79,0.25); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 24px; }
  .pw-manage-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
  .pw-manage-current { font-size: 20px; font-weight: 500; letter-spacing: 0.2em; color: var(--ink); font-family: monospace; margin-bottom: 4px; }
  .pw-manage-hint { font-size: 11px; color: var(--ink-light); margin-bottom: 12px; }
  .pw-change-form { display: flex; gap: 8px; }
  .pw-new-input { flex: 1; padding: 9px 14px; border: 1px solid rgba(61,107,79,0.3); border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; outline: none; background: var(--white); }
  .pw-new-input:focus { border-color: var(--accent); }
  .btn-pw-change { padding: 9px 18px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .pw-changed-msg { font-size: 12px; color: var(--accent); display: none; margin-top: 6px; }
  .pw-changed-msg.show { display: block; }

  .add-form { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
  .add-form-title { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 14px; }
  .form-col { display: flex; flex-direction: column; gap: 10px; }
  .form-row-inline { display: flex; gap: 10px; align-items: flex-end; }
  .form-group { flex: 1; }
  .form-label { display: block; font-size: 11px; letter-spacing: 0.1em; color: var(--ink-light); text-transform: uppercase; margin-bottom: 6px; }
  .form-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; outline: none; background: var(--bg); }
  .form-input:focus { border-color: var(--accent); background: var(--white); }
  .btn-primary { width: 100%; padding: 11px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; cursor: pointer; margin-top: 4px; }
  .btn-primary:hover { opacity: 0.85; }

  /* ADMIN LIST */
  .admin-list { display: flex; flex-direction: column; gap: 14px; }
  .admin-item { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .admin-item-header { padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .admin-item-icon { font-size: 20px; flex-shrink: 0; }
  .admin-item-info { flex: 1; min-width: 0; }
  .admin-item-name { font-size: 13px; font-weight: 500; margin-bottom: 1px; }
  .admin-item-desc { font-size: 11px; color: var(--ink-light); }
  .admin-item-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: var(--accent-light); color: var(--accent); white-space: nowrap; flex-shrink: 0; }
  .btn-toggle { padding: 6px 12px; background: none; border: 1px solid var(--border); color: var(--ink-light); border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .btn-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .btn-delete { padding: 6px 10px; background: none; border: 1px solid var(--border); color: var(--ink-light); border-radius: var(--radius); font-size: 12px; cursor: pointer; flex-shrink: 0; }
  .btn-delete:hover { border-color: var(--red); color: var(--red); }

  /* VIDEO SECTION */
  .video-section { border-top: 1px solid var(--border); padding: 16px; display: none; background: #fafaf8; }
  .video-section.open { display: block; }
  .video-section-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 12px; }
  .url-add-area { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .url-input, .url-title-input, .url-memo-input { width: 100%; padding: 9px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; outline: none; background: var(--white); }
  .url-input:focus, .url-title-input:focus, .url-memo-input:focus { border-color: var(--accent); }
  .btn-add-url { width: 100%; padding: 11px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; cursor: pointer; }
  .btn-add-url:hover { opacity: 0.85; }

  /* REGISTERED VIDEO ITEMS */
  .registered-videos { display: flex; flex-direction: column; gap: 10px; }
  .rv-item { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .rv-item-main { display: flex; align-items: center; gap: 10px; padding: 10px; }
  .rv-thumb { width: 72px; height: 41px; object-fit: cover; border-radius: 2px; background: var(--accent-light); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--accent); overflow: hidden; }
  .rv-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .rv-info { flex: 1; min-width: 0; }
  .rv-title { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rv-memo-preview { font-size: 11px; color: var(--ink-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rv-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-edit-video { padding: 5px 10px; background: none; border: 1px solid var(--border); color: var(--ink-light); border-radius: var(--radius); font-size: 11px; cursor: pointer; }
  .btn-edit-video:hover { border-color: var(--accent); color: var(--accent); }
  .btn-remove-video { padding: 5px 8px; background: none; border: 1px solid var(--border); color: var(--ink-light); border-radius: var(--radius); font-size: 11px; cursor: pointer; }
  .btn-remove-video:hover { border-color: var(--red); color: var(--red); }

  /* EDIT FORM (inline) */
  .rv-edit-form { border-top: 1px solid var(--border); padding: 10px; display: none; background: var(--bg); }
  .rv-edit-form.open { display: block; }
  .rv-edit-form input, .rv-edit-form textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; outline: none; background: var(--white); margin-bottom: 8px; }
  .rv-edit-form textarea { resize: vertical; min-height: 60px; }
  .rv-edit-form input:focus, .rv-edit-form textarea:focus { border-color: var(--accent); }
  .btn-save-edit { padding: 8px 20px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; cursor: pointer; }

  .no-videos-hint { font-size: 12px; color: var(--ink-light); font-style: italic; padding: 6px 0; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--ink-light); font-size: 13px; }
</style>
</head>
<body>

<div id="pw-screen" class="pw-screen">
  <div class="pw-box">
    <div class="pw-logo">ケア<span>マッチ</span></div>
    <div class="pw-tagline">セルフケア・エクササイズ検索</div>
    <label class="pw-label">今月のパスワード</label>
    <input class="pw-input" id="pw-input" type="password" placeholder="••••••" maxlength="20" onkeydown="if(event.key==='Enter') checkPassword()">
    <div class="pw-error" id="pw-error">パスワードが違います</div>
    <button class="pw-btn" onclick="checkPassword()">入力する</button>
    <div class="pw-hint">パスワードはLINEでお知らせしています</div>
  </div>
</div>

<div class="app" id="app">
  <header>
    <div class="logo">ケア<span>マッチ</span></div>
    <div class="header-right">
      <button class="tab-btn active" onclick="showPage('user', this)">ケアを探す</button>
      <button class="tab-btn" id="admin-tab" style="display:none" onclick="showPage('admin', this)">管理者</button>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <!-- USER -->
  <div id="page-user" class="page active">
    <div class="hero">
      <div class="hero-label">Self Care Match</div>
      <h1>あなたの身体の機能を<br>取り戻す</h1>
      <p>機能カテゴリから動画を探しましょう</p>
    </div>
    <div class="search-bar-wrap">
      <input class="search-bar" type="text" placeholder="例：股関節、肩こり、歩行..." oninput="filterCategories(this.value)">
      <span class="search-icon">🔍</span>
    </div>
    <div class="section-label" style="max-width:900px;margin:0 auto 12px;">機能カテゴリ</div>
    <div class="categories-grid" id="categories-grid"></div>
  </div>

  <!-- ADMIN -->
  <div id="page-admin" class="page">
    <div class="admin-wrap">
      <div class="admin-title">管理者ページ</div>
      <div class="admin-sub">カテゴリの登録・動画URLの管理ができます</div>

      <div class="pw-manage-card">
        <div class="pw-manage-label">📅 今月のパスワード</div>
        <div class="pw-manage-current" id="current-pw-display">care2026</div>
        <div class="pw-manage-hint">LINEでこのパスワードを患者さんに送ってください</div>
        <div class="pw-change-form">
          <input class="pw-new-input" id="pw-new-input" type="text" placeholder="新しいパスワード">
          <button class="btn-pw-change" onclick="changePassword()">変更</button>
        </div>
        <div class="pw-changed-msg" id="pw-changed-msg">✓ 変更しました</div>
      </div>

      <div class="add-form">
        <div class="add-form-title">カテゴリを追加</div>
        <div class="form-col">
          <div class="form-row-inline">
            <div class="form-group" style="max-width:72px">
              <label class="form-label">絵文字</label>
              <input class="form-input" id="input-icon" type="text" placeholder="🦵" maxlength="2">
            </div>
            <div class="form-group">
              <label class="form-label">カテゴリ名</label>
              <input class="form-input" id="input-name" type="text" placeholder="例：腰よサボれ、働け股関節">
            </div>
          </div>
          <div>
            <label class="form-label">説明（任意）</label>
            <input class="form-input" id="input-desc" type="text" placeholder="例：ヒンジ動作・腰痛予防">
          </div>
          <button class="btn-primary" onclick="addCategory()">追加する</button>
        </div>
      </div>

      <div class="admin-list" id="admin-list"></div>
    </div>
  </div>
</div>

<div class="video-panel" id="video-panel">
  <div class="panel-header">
    <div class="panel-title" id="panel-title"></div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div id="panel-body"></div>
</div>

<script>
let currentPassword = 'care2026';
let adminPassword = 'admin1234';
let categories = [
  { id: 1, icon: '🦵', name: '股関節を使いこなす', desc: '可動域・安定性の改善', videos: [] },
  { id: 2, icon: '🫁', name: '呼吸を整える', desc: '呼吸筋・横隔膜トレーニング', videos: [] },
  { id: 3, icon: '💪', name: '肩の可動域を広げる', desc: '肩関節の柔軟性向上', videos: [] },
  { id: 4, icon: '🧍', name: '正しい姿勢を作る', desc: '体幹・姿勢改善', videos: [] },
];
let nextId = 5;

function getYouTubeId(url) {
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
  return m ? m[1] : null;
}
function getThumbnail(url) {
  const id = getYouTubeId(url);
  return id ? `https://img.youtube.com/vi/${id}/mqdefault.jpg` : null;
}

function checkPassword() {
  const input = document.getElementById('pw-input').value.trim();
  if (input === currentPassword || input === adminPassword) {
    const isAdmin = (input === adminPassword);
    document.getElementById('admin-tab').style.display = isAdmin ? 'inline-block' : 'none';
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('app').classList.add('active');
    renderCategories(categories);
  } else {
    const el = document.getElementById('pw-input');
    document.getElementById('pw-error').classList.add('show');
    el.classList.add('error'); el.value = '';
    setTimeout(() => { el.classList.remove('error'); document.getElementById('pw-error').classList.remove('show'); }, 2000);
  }
}
function changePassword() {
  const v = document.getElementById('pw-new-input').value.trim();
  if (!v || v.length < 4) { alert('4文字以上で入力してください'); return; }
  currentPassword = v;
  document.getElementById('current-pw-display').textContent = v;
  document.getElementById('pw-new-input').value = '';
  const msg = document.getElementById('pw-changed-msg');
  msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 3000);
}
function logout() {
  document.getElementById('app').classList.remove('active');
  document.getElementById('pw-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

function renderCategories(list) {
  document.getElementById('categories-grid').innerHTML = list.map(c => `
    <div class="category-card" onclick="openPanel(${c.id})">
      <span class="cat-icon">${c.icon}</span>
      <div class="cat-name">${c.name}</div>
      <div class="cat-desc">${c.desc}</div>
      <div class="cat-count">${c.videos.length > 0 ? `動画 ${c.videos.length}本` : '動画準備中'}</div>
    </div>
  `).join('') || '<div class="empty-state" style="grid-column:1/-1">カテゴリがありません</div>';
}
function filterCategories(q) {
  renderCategories(q ? categories.filter(c => c.name.includes(q) || c.desc.includes(q)) : categories);
}

function openPanel(id) {
  const cat = categories.find(c => c.id === id);
  if (!cat) return;
  document.getElementById('panel-title').textContent = `${cat.icon} ${cat.name}`;
  const body = document.getElementById('panel-body');
  if (!cat.videos.length) {
    body.innerHTML = '<div class="empty-panel">🎬<br><br>動画を準備中です<br><span style="font-size:12px">もうしばらくお待ちください</span></div>';
  } else {
    body.innerHTML = `<div class="video-list">${cat.videos.map(v => {
      const thumb = getThumbnail(v.url);
      return `
        <div class="video-card">
          ${thumb ? `<img class="video-thumb" src="${thumb}" alt="${v.title || ''}" onerror="this.style.display='none'">` : '<div class="video-thumb-placeholder">▶</div>'}
          <div class="video-info">
            <div class="video-title">${v.title || 'YouTube動画'}</div>
            ${v.memo ? `<div class="video-memo-text">${v.memo}</div>` : ''}
            <a class="video-link" href="${v.url}" target="_blank">YouTubeで見る →</a>
          </div>
        </div>`;
    }).join('')}</div>`;
  }
  document.getElementById('video-panel').classList.add('open');
}
function closePanel() { document.getElementById('video-panel').classList.remove('open'); }

function renderAdmin() {
  const el = document.getElementById('admin-list');
  if (!categories.length) { el.innerHTML = '<div class="empty-state">まだカテゴリがありません</div>'; return; }
  el.innerHTML = categories.map(c => `
    <div class="admin-item" id="item-${c.id}">
      <div class="admin-item-header">
        <div class="admin-item-icon">${c.icon}</div>
        <div class="admin-item-info">
          <div class="admin-item-name">${c.name}</div>
          <div class="admin-item-desc">${c.desc || '説明なし'}</div>
        </div>
        <div class="admin-item-badge">動画 ${c.videos.length}本</div>
        <button class="btn-toggle" onclick="toggleVideoSection(${c.id})">動画を管理</button>
        <button class="btn-delete" onclick="deleteCategory(${c.id})">削除</button>
      </div>
      <div class="video-section" id="vs-${c.id}">
        <div class="video-section-title">動画を追加</div>
        <div class="url-add-area">
          <input class="url-title-input" id="vt-${c.id}" type="text" placeholder="タイトル（例：ヒップヒンジ基本解説）">
          <input class="url-input" id="vu-${c.id}" type="text" placeholder="YouTube URL">
          <input class="url-memo-input" id="vm-${c.id}" type="text" placeholder="メモ・概要（例：股関節の使い方を丁寧に解説）">
          <button class="btn-add-url" onclick="addVideo(${c.id})">登録する</button>
        </div>
        <div class="registered-videos" id="vlist-${c.id}">${renderVideoList(c)}</div>
      </div>
    </div>
  `).join('');
}

function renderVideoList(c) {
  if (!c.videos.length) return '<div class="no-videos-hint">まだ動画が登録されていません</div>';
  return c.videos.map((v, i) => {
    const thumb = getThumbnail(v.url);
    return `
      <div class="rv-item" id="rv-${c.id}-${i}">
        <div class="rv-item-main">
          <div class="rv-thumb">
            ${thumb ? `<img src="${thumb}" alt="" onerror="this.style.display='none'">` : '▶'}
          </div>
          <div class="rv-info">
            <div class="rv-title">${v.title || 'YouTube動画'}</div>
            <div class="rv-memo-preview">${v.memo || 'メモなし'}</div>
          </div>
          <div class="rv-actions">
            <button class="btn-edit-video" onclick="toggleEditForm(${c.id}, ${i})">編集</button>
            <button class="btn-remove-video" onclick="removeVideo(${c.id}, ${i})">✕</button>
          </div>
        </div>
        <div class="rv-edit-form" id="ef-${c.id}-${i}">
          <input type="text" id="et-${c.id}-${i}" value="${v.title || ''}" placeholder="タイトル">
          <textarea id="em-${c.id}-${i}" placeholder="メモ・概要">${v.memo || ''}</textarea>
          <button class="btn-save-edit" onclick="saveEdit(${c.id}, ${i})">保存</button>
        </div>
      </div>`;
  }).join('');
}

function toggleVideoSection(id) {
  document.getElementById(`vs-${id}`).classList.toggle('open');
}
function toggleEditForm(catId, i) {
  document.getElementById(`ef-${catId}-${i}`).classList.toggle('open');
}
function saveEdit(catId, i) {
  const cat = categories.find(c => c.id === catId);
  cat.videos[i].title = document.getElementById(`et-${catId}-${i}`).value.trim();
  cat.videos[i].memo  = document.getElementById(`em-${catId}-${i}`).value.trim();
  document.getElementById(`vlist-${catId}`).innerHTML = renderVideoList(cat);
  renderCategories(categories);
}

function addVideo(id) {
  const cat = categories.find(c => c.id === id);
  const url   = document.getElementById(`vu-${id}`).value.trim();
  const title = document.getElementById(`vt-${id}`).value.trim();
  const memo  = document.getElementById(`vm-${id}`).value.trim();
  if (!url) { alert('URLを入力してください'); return; }
  if (!url.includes('youtube') && !url.includes('youtu.be')) { alert('YouTubeのURLを入力してください'); return; }
  cat.videos.push({ url, title, memo });
  ['vu-','vt-','vm-'].forEach(p => document.getElementById(p+id).value = '');
  document.getElementById(`vlist-${id}`).innerHTML = renderVideoList(cat);
  document.querySelector(`#item-${id} .admin-item-badge`).textContent = `動画 ${cat.videos.length}本`;
  renderCategories(categories);
}
function removeVideo(catId, i) {
  const cat = categories.find(c => c.id === catId);
  cat.videos.splice(i, 1);
  document.getElementById(`vlist-${catId}`).innerHTML = renderVideoList(cat);
  document.querySelector(`#item-${catId} .admin-item-badge`).textContent = `動画 ${cat.videos.length}本`;
  renderCategories(categories);
}
function addCategory() {
  const icon = document.getElementById('input-icon').value.trim() || '📌';
  const name = document.getElementById('input-name').value.trim();
  const desc = document.getElementById('input-desc').value.trim();
  if (!name) { alert('カテゴリ名を入力してください'); return; }
  categories.push({ id: nextId++, icon, name, desc, videos: [] });
  ['input-icon','input-name','input-desc'].forEach(id => document.getElementById(id).value = '');
  renderAdmin(); renderCategories(categories);
}
function deleteCategory(id) {
  if (!confirm('削除しますか？')) return;
  categories = categories.filter(c => c.id !== id);
  renderAdmin(); renderCategories(categories); closePanel();
}
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  btn.classList.add('active');
  closePanel();
  if (name === 'admin') renderAdmin();
}
</script>
</body>
</html>
